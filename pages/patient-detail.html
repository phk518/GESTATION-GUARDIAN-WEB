<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Patient Record | Gestation Guardian</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">tailwind.config = { theme: { extend: { colors: { "primary": "#00497d", "secondary": "#535f70", "error": "#ba1a1a", "surface": "#f8fafc" }, fontFamily: { headline: ["Manrope"], body: ["Inter"] } } } }</script>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } .grid-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1.5rem; transition: all 0.2s ease; cursor: pointer; }</style>
</head>
<body class="flex overflow-hidden">
    <aside id="sidebar-target" class="h-screen w-64 fixed left-0 top-0 bg-white border-r border-slate-200 flex flex-col py-8 z-50"></aside>
    <main class="ml-64 flex-1 h-screen overflow-y-auto flex flex-col relative">
        <header class="flex justify-between items-center w-full px-10 py-5 sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
            <button onclick="window.location.href='../index.html'" class="flex items-center gap-2 text-slate-500 hover:text-primary font-bold text-sm transition-colors"><span class="material-symbols-outlined">arrow_back</span> Back to Overview</button>
        </header>
        <div class="p-10 max-w-[1400px] mx-auto w-full">
            <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-8">
                <div class="flex items-center gap-6">
                    <img id="detail-image" src="" class="w-24 h-24 rounded-3xl object-cover ring-4 ring-slate-100 shadow-lg">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h2 class="text-4xl font-black text-slate-900 tracking-tight font-headline" id="detail-name">Loading...</h2>
                            <span id="detail-status" class="px-3 py-1 rounded-md text-xs font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm"></span>
                        </div>
                        <p class="text-slate-500 font-bold tracking-widest uppercase text-sm">ID: <span id="detail-id"></span> • <span class="text-primary" id="detail-weeks"></span></p>
                    </div>
                </div>
                <button class="bg-white border border-slate-200 text-slate-700 rounded-xl px-6 py-3 font-bold flex items-center gap-2 hover:bg-slate-50 shadow-sm transition-all">
                    <span class="material-symbols-outlined text-[20px]">download</span> Export Report
                </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                <div onclick="routeToDeepDive('ecg-detail.html')" class="grid-card lg:col-span-2 hover:border-primary/50 hover:shadow-lg group relative">
                    <span class="material-symbols-outlined absolute top-4 right-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">open_in_new</span>
                    <div class="flex justify-between items-center mb-6"><h3 class="font-bold text-slate-400 uppercase tracking-widest text-xs flex items-center gap-2">Maternal ECG</h3><span class="text-2xl font-black text-slate-900"><span id="detail-mhr">--</span> <span class="text-sm text-slate-400">BPM</span></span></div>
                </div>
                <div id="bp-card" onclick="routeToDeepDive('blood-pressure-detail.html')" class="grid-card text-slate-900 border border-slate-200 relative overflow-hidden hover:shadow-lg group">
                    <span class="material-symbols-outlined absolute top-4 right-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity z-20">open_in_new</span>
                    <h3 class="font-bold text-slate-400 uppercase tracking-widest text-xs mb-6 relative z-10">Blood Pressure</h3>
                    <div class="mt-auto relative z-10"><p class="text-5xl font-black mb-1" id="detail-bp">-- <span class="text-2xl text-slate-400 font-medium">/ --</span></p><p id="bp-warning" class="text-slate-500 font-bold text-sm mt-2 flex items-center gap-1"></p></div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div id="fhr-card" onclick="routeToDeepDive('hrv-detail.html')" class="grid-card border border-slate-200 hover:shadow-lg hover:border-red-300 group relative">
                    <span class="material-symbols-outlined absolute top-4 right-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">open_in_new</span>
                    <h3 class="font-bold text-slate-400 uppercase tracking-widest text-xs flex items-center gap-2 mb-6">Fetal HR Baseline</h3>
                    <p class="text-5xl font-black mb-2" id="detail-fhr-text"><span id="detail-fhr">--</span> <span class="text-lg text-slate-400 font-medium">BPM</span></p>
                </div>
                <div onclick="routeToDeepDive('blood-oxygen-detail.html')" class="grid-card border border-slate-200 hover:shadow-lg hover:border-sky-300 group relative">
                    <span class="material-symbols-outlined absolute top-4 right-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">open_in_new</span>
                    <h3 class="font-bold text-slate-400 uppercase tracking-widest text-xs flex items-center gap-2 mb-6">Oxygen Saturation</h3>
                    <p class="text-5xl font-black text-slate-900 mb-2"><span id="detail-spo2">--</span><span class="text-2xl">%</span></p>
                </div>
                <div onclick="routeToDeepDive('respiratory-rate-detail.html')" class="grid-card border border-slate-200 hover:shadow-lg hover:border-amber-300 group relative">
                    <span class="material-symbols-outlined absolute top-4 right-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity">open_in_new</span>
                    <h3 class="font-bold text-slate-400 uppercase tracking-widest text-xs flex items-center gap-2 mb-6">Uterine Activity</h3>
                    <p class="text-4xl font-black text-slate-900 mb-2"><span id="detail-contractions">--</span> <span class="text-lg text-slate-400 font-medium">/ 10 min</span></p>
                    <p id="contraction-warning" class="text-xs font-bold text-slate-500 uppercase flex items-center gap-1"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DYNAMIC ROUTING SCRIPT
        window.routeToDeepDive = function(targetPage) {
            const urlParams = new URLSearchParams(window.location.search);
            let patientId = urlParams.get('id');
            if (patientId) { patientId = patientId.replace('/', ''); }
            window.location.href = `${targetPage}?id=${patientId}`;
        }

        const simulatedDatabase = [
            { id: "RPM-092", name: "Alice R.", weeks: 28, status: "Critical", image: "https://ui-avatars.com/api/?name=Alice+R&background=fecaca&color=ba1a1a", vitals: { maternalHR: 82, fetalHR: 142, bpSys: 145, bpDia: 92, spo2: 96, contractions: 3 } },
            { id: "RPM-114", name: "Maya T.", weeks: 34, status: "Warning", image: "https://ui-avatars.com/api/?name=Maya+T&background=fef3c7&color=b45309", vitals: { maternalHR: 76, fetalHR: 138, bpSys: 130, bpDia: 85, spo2: 98, contractions: 1 } },
            { id: "RPM-205", name: "Sarah J.", weeks: 39, status: "Stable", image: "https://ui-avatars.com/api/?name=Sarah+J&background=e0f2fe&color=00497d", vitals: { maternalHR: 72, fetalHR: 125, bpSys: 118, bpDia: 78, spo2: 100, contractions: 0 } },
            { id: "RPM-301", name: "Elena M.", weeks: 32, status: "Stable", image: "https://ui-avatars.com/api/?name=Elena+M&background=dcfce7&color=047857", vitals: { maternalHR: 68, fetalHR: 130, bpSys: 115, bpDia: 75, spo2: 99, contractions: 0 } }
        ];

        document.addEventListener("DOMContentLoaded", async () => {
            try { document.getElementById('sidebar-target').innerHTML = await (await fetch('../components/sidebar.html')).text(); } catch (e) {}

            const urlParams = new URLSearchParams(window.location.search);
            let patientId = urlParams.get('id');
            if (patientId) { patientId = patientId.replace('/', ''); }
            const patient = simulatedDatabase.find(p => p.id === patientId) || simulatedDatabase[0];

            if (!patient) return;

            document.getElementById('detail-name').innerText = patient.name;
            document.getElementById('detail-id').innerText = patient.id;
            document.getElementById('detail-weeks').innerText = patient.weeks + " Weeks Gestation";
            document.getElementById('detail-image').src = patient.image;
            document.getElementById('detail-mhr').innerText = patient.vitals.maternalHR;
            document.getElementById('detail-fhr').innerText = patient.vitals.fetalHR;
            document.getElementById('detail-spo2').innerText = patient.vitals.spo2;
            document.getElementById('detail-contractions').innerText = patient.vitals.contractions;
            document.getElementById('detail-bp').innerHTML = `${patient.vitals.bpSys} <span class="text-2xl text-slate-400 font-medium">/ ${patient.vitals.bpDia}</span>`;

            const statusEl = document.getElementById('detail-status');
            statusEl.innerText = patient.status;
            
            if (patient.status === 'Critical') {
                statusEl.className = 'bg-error/10 text-error px-3 py-1 rounded-md text-xs font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm';
                document.getElementById('bp-card').classList.add('bg-slate-900', 'text-white');
                document.getElementById('bp-warning').innerText = "Elevated Risk";
                document.getElementById('fhr-card').classList.add('bg-red-50/20', 'border-red-200');
                document.getElementById('detail-fhr-text').classList.add('text-error');
                document.getElementById('contraction-warning').innerText = "Irregular Detected";
                document.getElementById('contraction-warning').classList.add('text-amber-600');
            } 
            else if (patient.status === 'Warning') {
                statusEl.className = 'bg-amber-100 text-amber-700 px-3 py-1 rounded-md text-xs font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm';
                document.getElementById('bp-warning').innerText = "Borderline Normal";
                document.getElementById('contraction-warning').innerText = "Monitor Activity";
            } 
            else {
                statusEl.className = 'bg-emerald-100 text-emerald-700 px-3 py-1 rounded-md text-xs font-black uppercase tracking-widest flex items-center gap-1.5 shadow-sm';
                document.getElementById('bp-warning').innerText = "Normal Range";
                document.getElementById('contraction-warning').innerText = "No Activity Detected";
            }
        });
    </script>
</body>
</html>
